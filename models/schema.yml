version: 2

sources:
  - name: raw_projet
    schema: projet              # or use {{ target.schema }} for environment-safe naming
    loader: bigquery                 # identifies how data is loaded (fivetran, airbyte, etc.)
    tables:
      - name: challenger_match
        identifier: challenger_match
      - name: diamond_ranked
        identifier: high_diamond_ranked_10min
      - name: match_loser
        identifier: match_loser_data
      - name: match_winner
        identifier: match_winner_data
  
  - name: raw     
    schema: projet2              # or use {{ target.schema }} for environment-safe naming
    loader: bigquery                 # identifies how data is loaded (fivetran, airbyte, etc.)
    tables:
      - name: champions
        identifier: champs
      - name: matches
        identifier: matches
      - name: participants
        identifier: participants
      - name: stats1
        identifier: stats1
      - name: stats2
        identifier: stats2
      - name: teambans
        identifier: teambans
      - name: teamstats
        identifier: teamstats

models:
  # ============================================
  # INTERMEDIATE
  # ============================================
  - name: int_player_match_stats
    description: >
      Table centrale : 1 ligne = 1 joueur dans 1 match.
      Jointure participants + stats1/stats2 + matches + champions.
      Contient le rôle propre (Top/Jungle/Mid/ADC/Support),
      toutes les stats brutes ET normalisées par minute.
      ~95.7% des données classifiées (4.3% exclues = rôles ambigus).
    columns:
      - name: participant_id
        tests:
          - unique
          - not_null
      - name: clean_role
        tests:
          - not_null
          - accepted_values:
              values: ['Top', 'Jungle', 'Mid', 'ADC', 'Support']

  # ============================================
  # MARTS
  # ============================================
  - name: mart_role_profiles
    description: >
      Profil statistique moyen par rôle (5 lignes).
      Pour radar chart et table comparative.
    columns:
      - name: clean_role
        tests:
          - unique
          - not_null

  - name: mart_role_win_impact
    description: >
      Stats moyennes gagnants vs perdants par rôle (10 lignes).
      Pour bar charts comparatifs montrant l'écart de performance.

  - name: mart_role_win_correlations
    description: >
      Corrélations de Pearson entre chaque stat et la victoire, par rôle (5 lignes).
      Pour heatmap de corrélations.
    columns:
      - name: clean_role
        tests:
          - unique
          - not_null

  - name: mart_role_champion_performance
    description: >
      Performance des champions par rôle.
      Filtré sur 30+ games pour significativité statistique.
      Pour tableau filtrable et scatter plot.